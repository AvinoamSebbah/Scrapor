name: "W7 · Test Image Bridge"

on:
  workflow_dispatch:
    inputs:
      barcode:
        description: "Optional barcode to test. Leave empty to auto-find a missing Spaces image from top_promotions_cache."
        required: false
        default: ""
      pricez_barcode:
        description: "Known Pricez barcode used for the temporary Cloudinary→Spaces infrastructure test"
        required: false
        default: "30149649"
      max_candidates:
        description: "Max DB candidates to try when barcode is empty"
        required: false
        default: "1000"

jobs:
  test-image-bridge:
    name: "Pricez → Cloudinary bridge → Spaces"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt requests boto3 cloudinary

      - name: Test direct Cloudinary bridge to temporary Spaces object
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          DO_SPACES_ACCESS_KEY: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          DO_SPACES_SECRET_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          PRICEZ_BARCODE: ${{ inputs.pricez_barcode }}
        run: |
          python - <<'PY'
          import os
          import sys

          import boto3
          import cloudinary
          import cloudinary.uploader
          import requests

          required = [
              "CLOUDINARY_CLOUD_NAME",
              "CLOUDINARY_API_KEY",
              "CLOUDINARY_API_SECRET",
              "DO_SPACES_ACCESS_KEY",
              "DO_SPACES_SECRET_KEY",
              "DO_SPACES_BUCKET",
              "DO_SPACES_REGION",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing GitHub secrets for bridge infra test: {', '.join(missing)}")

          barcode = (os.environ.get("PRICEZ_BARCODE") or "").strip()
          if not barcode:
              raise SystemExit("pricez_barcode input is required")

          run_id = os.environ.get("GITHUB_RUN_ID", "manual")
          source_url = f"https://m.pricez.co.il/ProductPictures/200x/{barcode}.jpg"
          public_id = f"github-{run_id}-{barcode}"
          temp_key = f"bridge-tests/github/{run_id}/{barcode}.jpg"

          cloudinary.config(
              cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"],
              api_key=os.environ["CLOUDINARY_API_KEY"],
              api_secret=os.environ["CLOUDINARY_API_SECRET"],
              secure=True,
          )

          s3 = boto3.client(
              "s3",
              region_name=os.environ["DO_SPACES_REGION"],
              endpoint_url=f"https://{os.environ['DO_SPACES_REGION']}.digitaloceanspaces.com",
              aws_access_key_id=os.environ["DO_SPACES_ACCESS_KEY"],
              aws_secret_access_key=os.environ["DO_SPACES_SECRET_KEY"],
          )

          uploaded_public_id = None
          try:
              result = cloudinary.uploader.upload(
                  source_url,
                  folder="spaces-bridge-tests",
                  public_id=public_id,
                  overwrite=True,
                  invalidate=False,
                  resource_type="image",
              )
              uploaded_public_id = result["public_id"]
              secure_url = result.get("secure_url")
              if not secure_url:
                  raise AssertionError("Cloudinary did not return secure_url")

              image = requests.get(secure_url, timeout=60)
              image.raise_for_status()
              content_type = image.headers.get("content-type") or "image/jpeg"
              if not content_type.startswith("image/"):
                  raise AssertionError(f"Cloudinary secure_url returned non-image content-type: {content_type}")

              s3.put_object(
                  Bucket=os.environ["DO_SPACES_BUCKET"],
                  Key=temp_key,
                  Body=image.content,
                  ContentType=content_type,
                  CacheControl="public, max-age=300",
                  Metadata={"test": "github-image-bridge"},
              )
              s3.head_object(Bucket=os.environ["DO_SPACES_BUCKET"], Key=temp_key)
              print(f"Direct bridge infra OK: Pricez -> Cloudinary -> Spaces temp_key={temp_key} content_type={content_type}")
          finally:
              try:
                  s3.delete_object(Bucket=os.environ["DO_SPACES_BUCKET"], Key=temp_key)
              except Exception as exc:
                  print(f"Warning: could not delete temp Spaces object {temp_key}: {exc}", file=sys.stderr)
              if uploaded_public_id:
                  try:
                      cloudinary.uploader.destroy(uploaded_public_id, resource_type="image")
                  except Exception as exc:
                      print(f"Warning: could not delete temp Cloudinary asset {uploaded_public_id}: {exc}", file=sys.stderr)
          PY

      - name: Run bridge test
        env:
          DATABASE_URL: ${{ secrets.POSTGRESQL_URL }}
          BACKEND_API_URL: "https://api.agali.live"
          TEST_BARCODE: ${{ inputs.barcode }}
          MAX_CANDIDATES: ${{ inputs.max_candidates }}
        run: |
          python - <<'PY'
          import os
          import sys
          import time

          import psycopg2
          import requests

          backend = os.environ.get("BACKEND_API_URL", "https://api.agali.live").rstrip("/")
          endpoint = f"{backend}/api/products/images/batch"
          barcode = (os.environ.get("TEST_BARCODE") or "").strip()
          max_candidates = int(os.environ.get("MAX_CANDIDATES") or "300")

          session = requests.Session()

          def batch(code):
              resp = session.post(
                  endpoint,
                  json={"barcodes": [code], "bypassNegativeCache": True},
                  timeout=90,
              )
              resp.raise_for_status()
              payload = resp.json()
              return payload.get("images", {}).get(code, {})

          def assert_image_url(url):
              if not url:
                  raise AssertionError("No imageUrl returned")
              resp = session.get(url, timeout=60)
              resp.raise_for_status()
              ctype = resp.headers.get("content-type", "")
              if not ctype.startswith("image/"):
                  raise AssertionError(f"imageUrl returned non-image content-type: {ctype}")
              return ctype

          if barcode:
              candidates = [barcode]
          else:
              db_url = os.environ.get("DATABASE_URL")
              if not db_url:
                  raise SystemExit("DATABASE_URL/POSTGRESQL_URL secret is required for auto-find mode")
              conn = psycopg2.connect(db_url, connect_timeout=30)
              try:
                  with conn.cursor() as cur:
                      cur.execute(
                          """
                          WITH candidates AS (
                              SELECT DISTINCT item_code, 0 AS priority
                              FROM top_promotions_cache
                              WHERE item_code IS NOT NULL
                                AND COALESCE(has_image, FALSE) = FALSE

                              UNION

                              SELECT DISTINCT item_code, 1 AS priority
                              FROM top_promotions_cache
                              WHERE item_code IS NOT NULL

                              UNION

                              SELECT DISTINCT item_code, 2 AS priority
                              FROM products
                              WHERE item_code IS NOT NULL
                          )
                          SELECT item_code
                          FROM candidates
                          WHERE item_code <> ''
                          ORDER BY priority, random()
                          LIMIT %s
                          """,
                          (max_candidates,),
                      )
                      candidates = [str(row[0]).strip() for row in cur.fetchall() if str(row[0]).strip()]
              finally:
                  conn.close()

          print(f"Testing {len(candidates)} candidate(s) against {endpoint}")
          for code in candidates:
              first = batch(code)
              source = first.get("source")
              has_image = bool(first.get("imageUrl"))
              print(f"{code}: first source={source} has_image={has_image}")

              if source == "spaces":
                  if barcode:
                      raise AssertionError(f"{code} is already in Spaces; pick a barcode missing from Spaces to test the bridge")
                  continue

              if source != "pricez-cloudinary-bridge" or not has_image:
                  continue

              ctype = assert_image_url(first.get("imageUrl"))
              time.sleep(2)
              second = batch(code)
              second_source = second.get("source")
              second_has_image = bool(second.get("imageUrl"))
              print(f"{code}: second source={second_source} has_image={second_has_image} content_type={ctype}")

              if second_source != "spaces" or not second_has_image:
                  raise AssertionError(f"{code} did not persist to Spaces after bridge")

              print(f"Bridge OK for {code}")
              sys.exit(0)

          raise SystemExit("No candidate triggered pricez-cloudinary-bridge")
          PY
