name: Database Cleanup

# ⚠️  REPLACED by W1_cleanup.yml (which also chains W2 and W3).
# Kept for standalone manual cleanup only.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only — show what would be deleted without deleting'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup:
    name: "Cleanup expired DB data"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Scheduled runs always execute (that is the point of the schedule).
          # Manual dispatch respects the dry_run input (default: true = safe preview).
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python cleanup_db.py --execute
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            python cleanup_db.py --execute
          else
            python cleanup_db.py
          fi
