name: "W5 · Nightly Refresh Top Promotions"

# Rafraîchit top_promotions_cache chaque jour à 4h UTC.
# Lance uniquement le cache all-time.
# Peut aussi être déclenché manuellement.

on:
  schedule:
    - cron: '0 0 * * *'   # 4h00 UTC chaque jour
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Nombre final de promos max par magasin (défaut: 300)'
        required: false
        default: '300'

# Un seul refresh à la fois.
# Si un refresh est déjà en queue, la nouvelle tentative le remplace (évite l'accumulation).
concurrency:
  group: refresh-top-promotions
  cancel-in-progress: false

jobs:
  refresh:
    name: "Refresh top_promotions_cache"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Open PostgreSQL SSH tunnel
        uses: ./.github/actions/open-postgres-tunnel
        with:
          ssh-host: ${{ secrets.DO_HOST }}
          ssh-user: ${{ secrets.DO_USERNAME }}
          ssh-port: ${{ secrets.DO_PORT }}
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Refresh top promotions cache (up to 3 attempts)
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONIOENCODING: 'utf-8'
          DATABASE_URL: ${{ secrets.POSTGRESQL_URL }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          BACKEND_API_URL: 'https://api.agali.live'
        run: |
          TOP_N="${{ inputs.top_n || '300' }}"
          MAX_ATTEMPTS=3
          RETRY_DELAY_SECONDS=600

          for attempt in 1 2 3; do
            echo "Refresh top promotions cache - tentative ${attempt}/${MAX_ATTEMPTS}"
            if python refresh_top_promos.py --top-n "$TOP_N" --window-hours 0; then
              echo "Refresh top promotions cache terminé avec succès."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Échec de la tentative ${attempt}/${MAX_ATTEMPTS} - nouvelle tentative dans ${RETRY_DELAY_SECONDS}s."
              sleep "$RETRY_DELAY_SECONDS"
            fi
          done

          echo "Le refresh a échoué après ${MAX_ATTEMPTS} tentatives."
          exit 1

      - name: Send Bot 1 refresh summary
        if: success()
        env:
          TELEGRAM_BOT1_TOKEN: ${{ secrets.TELEGRAM_BOT1_TOKEN }}
          TELEGRAM_BOT1_CHAT_ID: ${{ secrets.TELEGRAM_BOT1_CHAT_ID }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
        run: |
          python reports/scrape_report.py \
            --source github \
            --status success \
            --title "W5 top promotions refresh" \
            --workflow "W5_refresh_top_promos.yml" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Bot 2 refresh failure alert
        if: failure()
        env:
          TELEGRAM_BOT2_TOKEN: ${{ secrets.TELEGRAM_BOT2_TOKEN }}
          TELEGRAM_BOT2_CHAT_ID: ${{ secrets.TELEGRAM_BOT2_CHAT_ID }}
        run: |
          python telegram_notify.py --bot health --message "🚨 <b>Agali Health</b> · W5 top promotions refresh failed\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
