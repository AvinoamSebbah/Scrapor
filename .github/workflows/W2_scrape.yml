name: "W2 · Scrape"

# Triggered by W1_cleanup.yml or manually.
#
# CONNECTION GUARANTEE:
#   Job 1 – fetch-processed-files: ONE Supabase connection → saves processed_files_cache.json
#   Jobs 2-36 – scrape (35 parallel): resolve the cache from the JSON file,
#     zero Supabase connections during the actual scraping.
# When every scrape job finishes, trigger-upload fans-in and fires W3.

on:
  workflow_dispatch:
    inputs:
      enabled_scrapers:
        description: 'Stores to scrape (comma-separated, empty = all). Ex: SHUFERSAL,VICTORY'
        required: false
        default: ''
      enabled_file_types:
        description: 'File types (comma-separated, empty = all). Ex: PRICE_FILE,STORE_FILE'
        required: false
        default: ''
      limit:
        description: 'Max files per store (empty = unlimited)'
        required: false
        default: ''

jobs:
  # --------------------------------------------------------------------------
  # ONE connection to fetch processed_files — closes immediately after.
  # --------------------------------------------------------------------------
  fetch-processed-files:
    name: "Fetch processed files (1 DB connection)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Fetch processed_files from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetch_processed_files.py

      - name: Upload cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-files-cache-w2
          path: processed_files_cache.json
          retention-days: 1

  scrape:
    name: "${{ matrix.store }}"
    needs: fetch-processed-files
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10       # Scraping is pure HTTP — full parallelism is safe
      matrix:
        store:
          - BAREKET
          - YAYNO_BITAN_AND_CARREFOUR
          - COFIX
          - CITY_MARKET_KIRYATGAT
          - CITY_MARKET_SHOPS
          - DOR_ALON
          - GOOD_PHARM
          - HAZI_HINAM
          - HET_COHEN
          - KESHET
          - KING_STORE
          - MAAYAN_2000
          - MAHSANI_ASHUK
          - NETIV_HASED
          - MESHMAT_YOSEF_1
          - MESHMAT_YOSEF_2
          - OSHER_AD
          - POLIZER
          - RAMI_LEVY
          - SALACH_DABACH
          - SHEFA_BARCART_ASHEM
          - SHUFERSAL
          - SHUK_AHIR
          - STOP_MARKET
          - SUPER_PHARM
          - SUPER_YUDA
          - SUPER_SAPIR
          - FRESH_MARKET_AND_SUPER_DOSH
          - QUIK
          - TIV_TAAM
          - VICTORY
          - YELLOW
          - YOHANANOF
          - ZOL_VEBEGADOL
          - WOLT

    steps:
      - name: Check if this store is requested
        id: check
        run: |
          REQUESTED="${{ inputs.enabled_scrapers }}"
          if [ -z "$REQUESTED" ] || echo ",$REQUESTED," | grep -q ",${{ matrix.store }},"; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.enabled == 'true'

      - uses: actions/setup-python@v5
        if: steps.check.outputs.enabled == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.enabled == 'true'
        run: pip install -r requirements.txt

      - name: Download processed-files cache
        if: steps.check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: processed-files-cache-w2

      - name: Scrape, Convert, Clean
        if: steps.check.outputs.enabled == 'true'
        env:
          OUTPUT_DESTINATION: supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROCESSED_FILES_CACHE: ./processed_files_cache.json  # avoids 35 parallel Supabase queries
          OPERATION: scraping,converting,clean_dump_files
          ENABLED_SCRAPERS: ${{ matrix.store }}
          ENABLED_FILE_TYPES: ${{ inputs.enabled_file_types }}
          LIMIT: ${{ inputs.limit }}
          APP_DATA_PATH: ./app_data
          LOG_LEVEL: WARNING
          TZ: Asia/Jerusalem
        run: python main.py

      - name: Upload outputs artifact
        if: steps.check.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.store }}
          path: |
            ./app_data/outputs/
            ./app_data/dumps/status/
          if-no-files-found: ignore
          retention-days: 1

  # --------------------------------------------------------------------------
  # Fan-in: runs only after EVERY scrape job completes (success or failure).
  # This is the single trigger point for W3 — guarantees all artifacts exist
  # before any upload begins.
  # --------------------------------------------------------------------------
  trigger-upload:
    name: "Trigger W3 – Upload"
    needs: [fetch-processed-files, scrape]   # waits for all 35 matrix jobs
    if: always()        # run even if some stores failed
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Start W3_upload (sequential DB upload)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run W3_upload.yml \
            --ref ${{ github.ref_name }} \
            -f scrape_run_id=${{ github.run_id }}
