name: "W7 · Sync Product Images"

# Synchronise les images produit automatiquement une fois par jour a 03:00
# Asia/Jerusalem. GitHub planifie en UTC : deux crons couvrent heure d'ete
# et heure d'hiver, puis une garde ne laisse passer que le bon declenchement.
# Peut aussi être déclenché manuellement avec des options de maintenance.

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      reset_all_to_null:
        description: "Remettre toute la colonne products.has_image à NULL avant le run ?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      check_spaces_first:
        description: "Scanner DigitalOcean Spaces avant les sources distantes ?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      recheck_all:
        description: "Retraiter tous les produits, pas seulement ceux à NULL ?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      recheck_non_ean_false:
        description: "Réparer les FALSE non-EAN issus de l'ancienne règle trop stricte ?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      dry_run:
        description: "Dry-run sans écriture DB ?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      preflight_only:
        description: "Tester uniquement le bridge + upload Space, sans toucher la DB ?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      limit:
        description: "Nombre max de produits à traiter (vide = illimité)"
        required: false
        default: ""

concurrency:
  group: sync-product-images
  cancel-in-progress: false

jobs:
  sync:
    name: "Sync products.has_image"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Select 03:00 Jerusalem schedule
        id: schedule_gate
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          OFFSET="$(TZ=Asia/Jerusalem date +'%z')"
          SCHEDULE="${{ github.event.schedule }}"
          SHOULD_RUN="false"

          if { [ "$SCHEDULE" = "0 0 * * *" ] && [ "$OFFSET" = "+0300" ]; } || \
             { [ "$SCHEDULE" = "0 1 * * *" ] && [ "$OFFSET" = "+0200" ]; }; then
            SHOULD_RUN="true"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

          if [ "$SHOULD_RUN" = "true" ]; then
            echo "Running product image sync for 03:00 Asia/Jerusalem."
          else
            echo "Skipping schedule $SCHEDULE with Asia/Jerusalem offset $OFFSET."
          fi

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true'

      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Open PostgreSQL SSH tunnel
        if: github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true'
        uses: ./.github/actions/open-postgres-tunnel
        with:
          ssh-host: ${{ secrets.DO_HOST }}
          ssh-user: ${{ secrets.DO_USERNAME }}
          ssh-port: ${{ secrets.DO_PORT }}
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Sync product images
        if: github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.should_run == 'true'
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          DATABASE_URL: ${{ secrets.POSTGRESQL_URL }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          DO_SPACES_ACCESS_KEY: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          DO_SPACES_SECRET_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          OPENFOODFACTS_USER_AGENT: "Agali-image-sync/1.0 (https://agali.live)"
        shell: bash
        run: |
          ARGS=()
          if [ "${{ inputs.reset_all_to_null }}" = "true" ]; then
            ARGS+=(--reset-all-to-null)
          fi
          if [ "${{ inputs.check_spaces_first }}" = "false" ]; then
            ARGS+=(--skip-spaces-check)
          fi
          if [ "${{ inputs.recheck_all }}" = "true" ]; then
            ARGS+=(--recheck-all)
          fi
          if [ "${{ inputs.recheck_non_ean_false }}" = "true" ]; then
            ARGS+=(--recheck-non-ean-false)
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "${{ inputs.preflight_only }}" = "true" ]; then
            ARGS+=(--preflight-only)
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS+=(--limit "${{ inputs.limit }}")
          fi
          python sync_product_images.py "${ARGS[@]}"
