name: Production | Scrape and Push to Supabase

on:
  schedule:
    - cron: '0 */3 * * *'

  workflow_dispatch:
    inputs:
      enabled_scrapers:
        description: >
          Magasins à scraper (séparés par virgule, vide = tous).
          Ex: SHUFERSAL,RAMI_LEVY,VICTORY
        required: false
        default: ''
      enabled_file_types:
        description: >
          Types de fichiers (séparés par virgule, vide = tous).
          Valeurs: PRICE_FILE, PRICE_FULL_FILE, PROMO_FILE, PROMO_FULL_FILE, STORE_FILE
        required: false
        default: ''
      limit:
        description: 'Nombre max de fichiers par magasin (vide = pas de limite)'
        required: false
        default: ''

jobs:
  # -------------------------------------------------------
  # 1 job par magasin — tous en parallèle
  # Dès qu'un job finit, il déclenche _prod_upload.yml
  # Pour désactiver un magasin, commentez son entrée dans matrix.store
  # -------------------------------------------------------
  scrape-convert:
    name: "${{ matrix.store }}"
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        store:
          - BAREKET
          - YAYNO_BITAN_AND_CARREFOUR
          - COFIX
          - CITY_MARKET_KIRYATGAT
          - CITY_MARKET_SHOPS
          - DOR_ALON
          - GOOD_PHARM
          - HAZI_HINAM
          - HET_COHEN
          - KESHET
          - KING_STORE
          - MAAYAN_2000
          - MAHSANI_ASHUK
          - NETIV_HASED
          - MESHMAT_YOSEF_1
          - MESHMAT_YOSEF_2
          - OSHER_AD
          - POLIZER
          - RAMI_LEVY
          - SALACH_DABACH
          - SHEFA_BARCART_ASHEM
          - SHUFERSAL
          - SHUK_AHIR
          - STOP_MARKET
          - SUPER_PHARM
          - SUPER_YUDA
          - SUPER_SAPIR
          - FRESH_MARKET_AND_SUPER_DOSH
          - QUIK
          - TIV_TAAM
          - VICTORY
          - YELLOW
          - YOHANANOF
          - ZOL_VEBEGADOL
          - WOLT

    steps:
      # Si un input manuel est fourni et ne contient pas ce store → skip tout
      - name: Check if this store is requested
        id: check
        run: |
          REQUESTED="${{ inputs.enabled_scrapers }}"
          if [ -z "$REQUESTED" ] || echo ",$REQUESTED," | grep -q ",${{ matrix.store }},"; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.enabled == 'true'
        run: pip install -r requirements.txt

      - name: Scrape, Convert, Clean
        if: steps.check.outputs.enabled == 'true'
        env:
          OUTPUT_DESTINATION: supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPERATION: scraping,converting,clean_dump_files
          ENABLED_SCRAPERS: ${{ matrix.store }}
          ENABLED_FILE_TYPES: ${{ inputs.enabled_file_types }}
          LIMIT: ${{ inputs.limit }}
          APP_DATA_PATH: ./app_data
          LOG_LEVEL: WARNING
          TZ: Asia/Jerusalem
        run: python main.py

      - name: Upload outputs artifact
        if: steps.check.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.store }}
          path: |
            ./app_data/outputs/
            ./app_data/dumps/status/
          if-no-files-found: ignore
          retention-days: 1

      - name: Trigger Supabase upload for ${{ matrix.store }}
        if: steps.check.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run _prod_upload.yml \
            --ref ${{ github.ref_name }} \
            -f store=${{ matrix.store }} \
            -f run_id=${{ github.run_id }}