name: "W6 · Price-Drop Notifications"

# Triggered explicitly by W2's "wait-for-w3s" job after ALL W3 uploads finish.
# workflow_run is NOT used because it only fires from the default branch.
# Also manually triggerable for testing.
#
# Flow: W2 (scrape + dispatch W3s + wait-for-w3s → dispatch W6) → W6 (notify users)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (set RESEND_API_KEY to empty to skip emails)"
        required: false
        default: "false"

concurrency:
  group: price-drop-notifications
  cancel-in-progress: false

jobs:
  notify:
    name: "Send price-drop emails"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Open PostgreSQL SSH tunnel
        uses: ./.github/actions/open-postgres-tunnel
        with:
          ssh-host: ${{ secrets.DO_HOST }}
          ssh-user: ${{ secrets.DO_USERNAME }}
          ssh-port: ${{ secrets.DO_PORT }}
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Run price-drop notifier
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONIOENCODING: 'utf-8'
          DATABASE_URL: ${{ secrets.POSTGRESQL_URL }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: "Agali Alerts <alerts@agali.live>"
          SITE_URL: 'https://agali.live'
          PRICE_DROP_SUMMARY_PATH: price_drop_summary.json
        run: python notify_price_drops.py

      - name: Send Bot 1 notification summary
        if: success()
        env:
          TELEGRAM_BOT1_TOKEN: ${{ secrets.TELEGRAM_BOT1_TOKEN }}
          TELEGRAM_BOT1_CHAT_ID: ${{ secrets.TELEGRAM_BOT1_CHAT_ID }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
        run: |
          python reports/scrape_report.py \
            --source github \
            --status success \
            --title "W6 price-drop notifications" \
            --workflow "W6_notify_price_drops.yml" \
            --summary-file price_drop_summary.json

      - name: Send Bot 2 notification failure alert
        if: failure()
        env:
          TELEGRAM_BOT2_TOKEN: ${{ secrets.TELEGRAM_BOT2_TOKEN }}
          TELEGRAM_BOT2_CHAT_ID: ${{ secrets.TELEGRAM_BOT2_CHAT_ID }}
        run: |
          python telegram_notify.py --bot health --message "🚨 <b>Agali Health</b> · W6 price-drop notifications failed\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
