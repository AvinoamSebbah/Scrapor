name: "W5 · Nightly Refresh Top Promotions"

# Rafraîchit top_promotions_cache chaque nuit à 1h UTC.
# Lance les 3 fenêtres temporelles : 24h, 7 jours, all-time.
# Peut aussi être déclenché manuellement.

on:
  schedule:
    - cron: '0 1 * * *'   # 1h00 UTC chaque nuit
  workflow_dispatch:
    inputs:
      top_n:
        description: 'Nombre de promos max par magasin (défaut: 200)'
        required: false
        default: '200'
      window_hours:
        description: 'Fenêtre unique en heures (vide = toutes : 24h, 168h, all-time)'
        required: false
        default: ''

# Un seul refresh à la fois.
# Si un refresh est déjà en queue, la nouvelle tentative le remplace (évite l'accumulation).
concurrency:
  group: refresh-top-promotions
  cancel-in-progress: false

jobs:
  refresh:
    name: "Refresh top_promotions_cache"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for active W3 uploads to finish
        # Attend que tous les W3 (uploads par magasin) soient terminés avant de
        # toucher top_promotions_cache — évite les deadlocks DB en cas d'écriture
        # concurrente sur les tables sources pendant le refresh.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          MAX_WAIT=7200   # 2h max d'attente
          ELAPSED=0
          INTERVAL=60
          echo "⏳  Vérification des W3 (uploads magasin) actifs ou en file…"
          while true; do
            IN_PROGRESS=$(gh api "/repos/${{ github.repository }}/actions/runs?status=in_progress&per_page=100" \
              --jq '[.workflow_runs[] | select(.name | startswith("W3"))] | length')
            QUEUED=$(gh api "/repos/${{ github.repository }}/actions/runs?status=queued&per_page=100" \
              --jq '[.workflow_runs[] | select(.name | startswith("W3"))] | length')
            WAITING=$(gh api "/repos/${{ github.repository }}/actions/runs?status=waiting&per_page=100" \
              --jq '[.workflow_runs[] | select(.name | startswith("W3"))] | length')
            TOTAL=$((IN_PROGRESS + QUEUED + WAITING))
            if [ "$TOTAL" = "0" ]; then
              echo "✅  Aucun W3 actif — démarrage du refresh."
              break
            fi
            echo "   ${IN_PROGRESS} W3 en cours · ${QUEUED} en file · ${WAITING} en attente — retry dans ${INTERVAL}s (${ELAPSED}s écoulés)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "❌  Timeout (${MAX_WAIT}s) en attendant la fin des W3 — abandon du refresh."
              exit 1
            fi
          done

      - name: Refresh top promotions cache
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONIOENCODING: 'utf-8'
          DATABASE_URL: ${{ secrets.POSTGRESQL_URL }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          BACKEND_API_URL: 'https://api.agali.live'
        run: |
          TOP_N="${{ inputs.top_n || '200' }}"
          WINDOW="${{ inputs.window_hours }}"
          if [ -n "$WINDOW" ]; then
            python refresh_top_promos.py --top-n "$TOP_N" --window-hours "$WINDOW"
          else
            python refresh_top_promos.py --top-n "$TOP_N"
          fi
