name: "W9 · Daily Scrapor Telegram Report"

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print Telegram payload instead of sending"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Open PostgreSQL SSH tunnel
        continue-on-error: true
        uses: ./.github/actions/open-postgres-tunnel
        with:
          ssh-host: ${{ secrets.DO_HOST }}
          ssh-user: ${{ secrets.DO_USERNAME }}
          ssh-port: ${{ secrets.DO_PORT }}
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Send daily report
        env:
          TELEGRAM_BOT1_TOKEN: ${{ secrets.TELEGRAM_BOT1_TOKEN }}
          TELEGRAM_BOT1_CHAT_ID: ${{ secrets.TELEGRAM_BOT1_CHAT_ID }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
        run: |
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS+=(--dry-run); fi
          python reports/scrape_report.py \
            --source github \
            --status success \
            --title "Daily 24h Scrapor report" \
            --workflow "W9_daily_scrapor_report.yml" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --hours 24 \
            "${ARGS[@]}"
