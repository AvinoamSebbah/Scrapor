name: "W1 · Cleanup"

# Runs every 3h and kicks off the full pipeline: W1 → W2 → W3.
# Manual dispatch lets you run cleanup alone or trigger a full cycle.

on:
  schedule:
    - cron: '0 */3 * * *'   # 00:00, 03:00, 06:00 … UTC
  workflow_dispatch:
    inputs:
      trigger_scrape:
        description: 'Trigger W2 scrape after cleanup?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

# Only one pipeline (W1/W2/W3) can run at a time.
# A second trigger waits in queue instead of launching a duplicate.
concurrency:
  group: supermarket-pipeline
  cancel-in-progress: false

jobs:
  cleanup:
    name: "DB Cleanup"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run cleanup
        env:
          PYTHONUNBUFFERED: '1'
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
        run: python cleanup_db.py --execute

  trigger-fetch:
    name: "Trigger W0 – Fetch"
    needs: cleanup
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Start W0_fetch
        # Skip if manually requested not to trigger
        if: github.event_name == 'schedule' || inputs.trigger_scrape == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run W0_fetch.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
